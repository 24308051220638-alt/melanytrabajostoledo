<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarea JS Completa | Melany Muñoz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ===== FONDO ANIMADO ===== */
        body {
            background: linear-gradient(-45deg,#f8fafc,#eef2ff,#e0e7ff,#f1f5f9);
            background-size: 400% 400%;
            animation: fondoAnimado 12s ease infinite;
        }

        @keyframes fondoAnimado {
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* ===== APARECER ===== */
        .fade-in {
            animation: aparecer .7s ease;
        }

        @keyframes aparecer {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* ===== FLOTANTE ===== */
        .floating {
            animation: flotante 3s ease-in-out infinite;
        }

        @keyframes flotante {
            0%{transform:translateY(0px);}
            50%{transform:translateY(-10px);}
            100%{transform:translateY(0px);}
        }

        /* ===== TARJETAS ===== */
        .card-hover { transition: .3s; }
        .card-hover:hover {
            transform:translateY(-5px);
            box-shadow:0 12px 25px rgba(0,0,0,.12);
        }

        /* ===== RESULTADO ===== */
        .resultadoAnimado {
            animation: pulse .6s ease;
        }

        @keyframes pulse {
            0% { transform:scale(.9); opacity:.5; }
            100% { transform:scale(1); opacity:1; }
        }

        /* ===== BOTONES ===== */
        .btn-hover { transition:.3s; }
        .btn-hover:hover { transform:translateX(8px); }

        ::-webkit-scrollbar { width:8px; }
        ::-webkit-scrollbar-thumb { background:#6366f1; border-radius:10px; }
    </style>
</head>

<body class="p-4 font-sans antialiased">

    <nav class="bg-white border-b mb-8 p-4 rounded-xl shadow-sm flex justify-between items-center max-w-6xl mx-auto fade-in">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold floating">
                MM
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">
                MELANY <span class="text-indigo-600">MUÑOZ</span>
            </h1>
        </div>
        <button onclick="toggleView()" id="btn-text" class="bg-slate-900 text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-indigo-600 hover:scale-105 transition-all">
            Ver Problemas
        </button>
    </nav>

    <main class="max-w-6xl mx-auto">
        <section id="welcome-section" class="text-center py-20 fade-in">
            <img src="https://i.pinimg.com/736x/4c/ec/8d/4cec8db09d201698987831d03e9e249a.jpg" class="w-48 h-48 mx-auto rounded-full mb-6 shadow-lg object-cover floating">
            <h2 class="text-4xl font-black mb-4 text-slate-800">Problemas JavaScript</h2>
        </section>

        <section id="main-container" style="display:none;" class="grid md:grid-cols-2 gap-8 fade-in">
            <div class="bg-white p-6 rounded-2xl shadow border card-hover">
                <h2 class="font-bold text-indigo-600 mb-4 border-b pb-2">LISTADO DE PROBLEMAS</h2>
                <div class="grid gap-2 overflow-y-auto max-h-[500px] pr-2">
                    <button onclick="prepararFormulario('2.10')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.10 PAGO CONAGUA</button>
                    <button onclick="prepararFormulario('2.11')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.11 PAGO LUZ (CLS)</button>
                    <button onclick="prepararFormulario('2.12')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.12 DESCUENTO E IVA</button>
                    <button onclick="prepararFormulario('2.13')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.13 AHORRO ANUAL</button>
                    <button onclick="prepararFormulario('2.14')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.14 VIÁTICOS MONTERREY</button>
                    <button onclick="prepararFormulario('2.15')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.15 POTENCIA ELÉCTRICA</button>
                    <button onclick="prepararFormulario('2.16')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.16 ÁREA CUADRADO</button>
                    <button onclick="prepararFormulario('2.17')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.17 PROMEDIO EXÁMENES</button>
                    <button onclick="prepararFormulario('2.18')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.18 TIEMPO VIVIDO</button>
                    <button onclick="prepararFormulario('2.19')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.19 COSTO LLAMADA</button>
                    <button onclick="prepararFormulario('2.20')" class="text-left p-3 bg-slate-50 rounded-lg border hover:bg-indigo-50 text-xs font-bold btn-hover">2.20 ESTANCIA HOTEL</button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow border-t-4 border-indigo-600 card-hover">
                <div id="contenido-dinamico">
                    <p class="text-slate-400 text-center py-10 italic">Selecciona un ejercicio a la izquierda para visualizar el problema y calcular.</p>
                </div>
            </div>
        </section>
    </main>

<script>
    function toggleView(){
        let bienvenida = document.getElementById("welcome-section");
        let principal = document.getElementById("main-container");
        let boton = document.getElementById("btn-text");

        if(principal.style.display === "none"){
            bienvenida.style.display = "none";
            principal.style.display = "grid";
            boton.textContent = "Inicio";
        }else{
            bienvenida.style.display = "block";
            principal.style.display = "none";
            boton.textContent = "Ver Problemas";
        }
    }

    function prepararFormulario(id){
        let area = document.getElementById("contenido-dinamico");
        let enunciado = "";
        let inputsHtml = "";
        let calculoFuncion = "";

        if(id === '2.10'){
            enunciado = "2.10 La CONAGUA requiere determinar el pago que debe realizar una persona por el total de metros cúbicos que consume de agua.";
            inputsHtml = `
                <input type="number" id="v1" placeholder="Metros cúbicos consumidos" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v2" placeholder="Precio por m3" class="w-full p-2 border mb-4 rounded">
            `;
            calculoFuncion = "ejercicio210()";
        }
        else if(id === '2.11'){
            enunciado = "2.11 La compañía de luz y sombras (CLS) requiere determinar el pago por el consumo de energía eléctrica (kilowatts).";
            inputsHtml = `
                <input type="number" id="v1" placeholder="KW Consumidos" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v2" placeholder="Precio por KW" class="w-full p-2 border mb-4 rounded">
            `;
            calculoFuncion = "ejercicio211()";
        }
        else if(id === '2.12'){
            enunciado = "2.12 Determinar cuánto pagará una persona por un artículo con un descuento de 20%, y debe pagar 15% de IVA.";
            inputsHtml = `<input type="number" id="v1" placeholder="Precio del artículo" class="w-full p-2 border mb-4 rounded">`;
            calculoFuncion = "ejercicio212()";
        }
        else if(id === '2.13'){
            enunciado = "2.13 Determinar cuánto dinero ahorra una persona en un año si cada semana ahorra 15% de su sueldo.";
            inputsHtml = `<input type="number" id="v1" placeholder="Sueldo semanal" class="w-full p-2 border mb-4 rounded">`;
            calculoFuncion = "ejercicio213()";
        }
        else if(id === '2.14'){
            enunciado = "2.14 Determinar el monto de un cheque: hotel, comida y 100.00 pesos diarios para otros gastos.";
            inputsHtml = `
                <input type="number" id="v1" placeholder="Días de viaje" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v2" placeholder="Hotel diario" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v3" placeholder="Comida diaria" class="w-full p-2 border mb-4 rounded">
            `;
            calculoFuncion = "ejercicio214()";
        }
        else if(id === '2.15'){
            enunciado = "2.15 Calcular la potencia eléctrica de un circuito. Considere: P = V*I y V = R*I.";
            inputsHtml = `
                <input type="number" id="v1" placeholder="Resistencia (R)" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v2" placeholder="Intensidad (I)" class="w-full p-2 border mb-4 rounded">
            `;
            calculoFuncion = "ejercicio215()";
        }
        else if(id === '2.16'){
            enunciado = "2.16 Realice el algoritmo para encontrar el área de un cuadrado.";
            inputsHtml = `<input type="number" id="v1" placeholder="Lado del cuadrado" class="w-full p-2 border mb-4 rounded">`;
            calculoFuncion = "ejercicio216()";
        }
        else if(id === '2.17'){
            enunciado = "2.17 Promedio de tres exámenes: el 1ero y 2do valen 25% y el 3ero vale 50%.";
            inputsHtml = `
                <input type="number" id="v1" placeholder="Examen 1" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v2" placeholder="Examen 2" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v3" placeholder="Examen 3" class="w-full p-2 border mb-4 rounded">
            `;
            calculoFuncion = "ejercicio217()";
        }
        else if(id === '2.18'){
            enunciado = "2.18 Determine aproximadamente cuántos meses, semanas, días y horas ha vivido una persona.";
            inputsHtml = `<input type="number" id="v1" placeholder="Edad actual" class="w-full p-2 border mb-4 rounded">`;
            calculoFuncion = "ejercicio218()";
        }
        else if(id === '2.19'){
            enunciado = "2.19 Determinar el costo de una llamada telefónica con base en el tiempo y el costo por minuto.";
            inputsHtml = `
                <input type="number" id="v1" placeholder="Minutos" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v2" placeholder="Costo por minuto" class="w-full p-2 border mb-4 rounded">
            `;
            calculoFuncion = "ejercicio219()";
        }
        else if(id === '2.20'){
            enunciado = "2.20 Hotel “Cama Arena”: determinar lo que le debe cobrar a un huésped por su estancia.";
            inputsHtml = `
                <input type="number" id="v1" placeholder="Días estancia" class="w-full p-2 border mb-2 rounded">
                <input type="number" id="v2" placeholder="Tarifa por día" class="w-full p-2 border mb-4 rounded">
            `;
            calculoFuncion = "ejercicio220()";
        }

        area.innerHTML = `
            <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 mb-6 rounded-r-lg fade-in">
                <p class="text-indigo-800 text-sm font-medium italic">${enunciado}</p>
            </div>
            ${inputsHtml}
            <button onclick="${calculoFuncion}" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold hover:bg-indigo-700 hover:scale-105 active:scale-95 transition-all">
                Calcular Resultado
            </button>
            <div id="res" class="mt-6 p-4 bg-slate-50 border border-dashed border-slate-300 rounded-xl text-indigo-700 font-bold text-center">
                Esperando datos...
            </div>
        `;
    }

    function animarResultado(){
        let resultado = document.getElementById("res");
        resultado.classList.remove("resultadoAnimado");
        void resultado.offsetWidth;
        resultado.classList.add("resultadoAnimado");
    }

    function ejercicio210(){
        let metros = parseFloat(document.getElementById("v1").value);
        let costo = parseFloat(document.getElementById("v2").value);
        const total = metros * costo;
        document.getElementById("res").textContent = "Total CONAGUA: $" + total.toFixed(2);
        animarResultado();
    }

    function ejercicio211(){
        let kw = parseFloat(document.getElementById("v1").value);
        let costo = parseFloat(document.getElementById("v2").value);
        const total = kw * costo;
        document.getElementById("res").textContent = "Pago CLS: $" + total.toFixed(2);
        animarResultado();
    }

    function ejercicio212(){
        let precio = parseFloat(document.getElementById("v1").value);
        let conDesc = precio * 0.80;
        let final = conDesc * 1.15;
        document.getElementById("res").textContent = "Con desc: $" + conDesc.toFixed(2) + " | Final con IVA: $" + final.toFixed(2);
        animarResultado();
    }

    function ejercicio213(){
        let sueldo = parseFloat(document.getElementById("v1").value);
        let ahorro = (sueldo * 0.15) * 4 * 12;
        document.getElementById("res").textContent = "Ahorro anual: $" + ahorro.toFixed(2);
        animarResultado();
    }

    function ejercicio214(){
        let d = parseFloat(document.getElementById("v1").value);
        let h = parseFloat(document.getElementById("v2").value) * d;
        let c = parseFloat(document.getElementById("v3").value) * d;
        let o = 100 * d;
        document.getElementById("res").textContent = "Total cheque: $" + (h + c + o).toFixed(2);
        animarResultado();
    }

    function ejercicio215(){
        let r = parseFloat(document.getElementById("v1").value);
        let i = parseFloat(document.getElementById("v2").value);
        let v = r * i;
        let p = v * i;
        document.getElementById("res").textContent = "Potencia: " + p.toFixed(2) + " Watts";
        animarResultado();
    }

    function ejercicio216(){
        let lado = parseFloat(document.getElementById("v1").value);
        document.getElementById("res").textContent = "Área: " + (lado * lado).toFixed(2) + " u²";
        animarResultado();
    }

    function ejercicio217(){
        let e1 = parseFloat(document.getElementById("v1").value) * 0.25;
        let e2 = parseFloat(document.getElementById("v2").value) * 0.25;
        let e3 = parseFloat(document.getElementById("v3").value) * 0.50;
        document.getElementById("res").textContent = "Promedio final: " + (e1 + e2 + e3).toFixed(2);
        animarResultado();
    }

    function ejercicio218(){
        let edad = parseFloat(document.getElementById("v1").value);
        document.getElementById("res").textContent = (edad*12) + " meses, " + (edad*52) + " semanas, " + (edad*365) + " días y " + (edad*8760) + " horas.";
        animarResultado();
    }

    function ejercicio219(){
        let m = parseFloat(document.getElementById("v1").value);
        let c = parseFloat(document.getElementById("v2").value);
        document.getElementById("res").textContent = "Costo llamada: $" + (m * c).toFixed(2);
        animarResultado();
    }

    function ejercicio220(){
        let d = parseFloat(document.getElementById("v1").value);
        let t = parseFloat(document.getElementById("v2").value);
        document.getElementById("res").textContent = "Total hotel: $" + (d * t).toFixed(2);
        animarResultado();
    }
</script>

</body>
</html>
